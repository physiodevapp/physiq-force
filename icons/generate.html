<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generate PhysiQ Force icons</title>
<style>
  body { font-family: system-ui; background: #0a0d12; color: #e8edf5; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 2rem; }
  canvas { border-radius: 12px; }
  button { padding: .7rem 1.5rem; border-radius: 8px; border: none; background: #fb923c; color: #0a0d12; font-size: 1rem; font-weight: 600; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  .previews { display: flex; gap: 2rem; align-items: flex-end; }
  p { color: #8fa0bf; font-size: .9rem; }
</style>
</head>
<body>
<h2>PhysiQ Force — Icon generator</h2>
<p>Abre esta página en el navegador, pulsa el botón y guarda los dos archivos en <code>icons/</code>.</p>

<div class="previews">
  <div>
    <p style="margin-bottom:.5rem">icon-192.png</p>
    <canvas id="c192" width="192" height="192"></canvas>
  </div>
  <div>
    <p style="margin-bottom:.5rem">icon-512.png</p>
    <canvas id="c512" width="512" height="512"></canvas>
  </div>
</div>

<button onclick="downloadAll()">Descargar icon-192.png e icon-512.png</button>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s   = canvas.width;
  const r   = s * 0.22;   // corner radius

  // background
  ctx.fillStyle = '#0a0d12';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // bar (horizontal rod)
  const barH  = s * 0.09;
  const barY  = s * 0.455;
  ctx.fillStyle = '#fb923c';
  ctx.beginPath();
  ctx.roundRect(s * 0.14, barY, s * 0.72, barH, barH / 2);
  ctx.fill();

  // left weight plate
  const wW = s * 0.095, wH = s * 0.28, wX = s * 0.09, wY = s * 0.36;
  ctx.beginPath();
  ctx.roundRect(wX, wY, wW, wH, wW * 0.35);
  ctx.fill();

  // right weight plate
  ctx.beginPath();
  ctx.roundRect(s - wX - wW, wY, wW, wH, wW * 0.35);
  ctx.fill();

  // left outer collar
  ctx.fillStyle = '#fcd34d';
  const cW = s * 0.06, cH = s * 0.18, cY = s * 0.41;
  ctx.beginPath();
  ctx.roundRect(s * 0.033, cY, cW, cH, cW * 0.35);
  ctx.fill();

  // right outer collar
  ctx.beginPath();
  ctx.roundRect(s - s * 0.033 - cW, cY, cW, cH, cW * 0.35);
  ctx.fill();
}

function downloadAll() {
  ['c192', 'c512'].forEach(id => {
    const canvas = document.getElementById(id);
    const a      = document.createElement('a');
    a.download   = `icon-${canvas.width}.png`;
    a.href       = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
